<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在前往預約表單...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #28a745; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="loader" style="margin: 0 auto 10px;"></div>
    <div>安全連線中，請稍候...</div>
</div>

<script>
    // 你的 n8n 表單測試或正式網址（原本填在 LINE 後台的那串）
    const n8nFormUrl = "https://n8nchen0823.zeabur.app/form-test/bf5bb3ad-39a5-4e47-88bb-fd2abc41e65e";

    liff.init({ liffId: "2010753835-STtRlyZK" }) 
        .then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                liff.getProfile().then(profile => {
                    // 核心魔法：把抓到的 UserID 用 ?line_uid= 的方式接在 n8n 表單網址後面
                    const targetUrl = `${n8nFormUrl}?line_uid=${profile.userId}`;
                    
                    // 自動跳轉到帶有 ID 的 n8n 表單
                    window.location.href = targetUrl;
                }).catch(err => {
                    alert("讀取 LINE 帳號失敗，請重新開啟");
                });
            }
        })
        .catch((err) => {
            alert("系統初始化失敗");
        });
</script>

</body>
</html>        <input type="text" id="name" required placeholder="請輸入姓名">

        <label>電話</label>
        <input type="tel" id="phone" required placeholder="請輸入電話">

        <button type="submit">提交預約資料</button>
    </form>
</div>

<script>
    // 1. 初始化 LINE LIFF
    liff.init({ liffId: "2010753835-STtRlyZK" }) 
        .then(() => {
            if (!liff.isLoggedIn()) {
                liff.login(); // 如果沒登入，強制引導在 LINE 內登入授權
            } else {
                // 2. 成功登入後，背景秒抓 User ID
                liff.getProfile().then(profile => {
                    document.getElementById('line_uid').value = profile.userId;
                    document.getElementById('status').style.display = 'none';
                    document.getElementById('bookingForm').style.display = 'block'; // 顯示表單
                }).catch(err => {
                    document.getElementById('status').innerText = "抓取 ID 失敗: " + err;
                });
            }
        })
        .catch((err) => {
            document.getElementById('status').innerText = "LIFF 初始化失敗: " + err;
        });

    // 3. 表單送出時，打包資料 POST 給 n8n Webhook
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            line_uid: document.getElementById('line_uid').value,
            client_type: document.getElementById('client_type').value,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value
        };

        document.getElementById('status').innerText = "正在送出資料...";
        document.getElementById('status').style.display = 'block';

        fetch("https://n8nchen0823.zeabur.app/form-test/bf5bb3ad-39a5-4e47-88bb-fd2abc41e65e", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        .then(res => {
            alert("預約成功！表單已關閉，請回到 LINE 聊天室查看確認信。");
            liff.closeWindow(); // 成功後自動關閉表單視窗
        })
        .catch(err => {
            alert("傳送失敗，請稍後再試。");
        });
    });
</script>

</body>
</html>
